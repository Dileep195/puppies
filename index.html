
<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puppy Sanctuary for Anvesha</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:20px;
}

/* glowing title */

.glow{
font-size:28px;
color:#ffd1f4;
text-shadow:
0 0 10px #ff9ed6,
0 0 20px #ff9ed6,
0 0 30px #ff9ed6;
margin-top:10px;
}

/* subtitle */

.subtitle{
opacity:0.9;
margin-top:8px;
margin-bottom:20px;
font-size:15px;
}

/* puppy image */

#puppy-display{
width:85%;
max-width:320px;
border-radius:20px;
box-shadow:0 0 30px rgba(255,255,255,0.3);
}

/* button */

button{
margin-top:25px;
padding:14px 26px;
border:none;
border-radius:30px;
background:#ffb6e6;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

/* floating puppies */

.floating{
position:fixed;
bottom:-80px;
font-size:28px;
animation:floatUp 10s linear infinite;
opacity:0.7;
}

@keyframes floatUp{

0%{
transform:translateY(0);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}

}

/* bottom quote */

.quote{
position:fixed;
bottom:25px;
left:0;
right:0;
font-size:17px;
padding:10px 25px;
text-align:center;
color:#ffd6f2;
text-shadow:0 0 10px rgba(255,182,230,0.8);
line-height:1.4;
}

</style>
</head>


<body>

<div class="glow">✨ Get Well Soon Anvesha ✨</div>

<div class="subtitle">
Some puppies brought you flowers today 🌷🐶
</div>

<img id="puppy-display" src="images/puppy-flower1.gif">

<br>

<button onclick="nextPuppy()">Next Puppy 🌷</button>


<div class="quote">
“A few puppies brought you flowers today… because someone wants you to smile.” 🌷🐶
</div>


<script>

const puppyGifs = [

"images/puppy-flower1.gif",
"images/puppy-flower2.gif",
"images/puppy-flower3.gif",
"images/puppy-flower4.gif",
"images/puppy-flower5.gif"

];

let current = 0;

function nextPuppy(){

current++;

if(current >= puppyGifs.length){
current = 0;
}

document.getElementById("puppy-display").src = puppyGifs[current];

}

/* floating puppies */

setInterval(()=>{

const pup=document.createElement("div");

pup.className="floating";

pup.innerHTML="🐶";

pup.style.left=Math.random()*100+"vw";

document.body.appendChild(pup);

setTimeout(()=>{
pup.remove();
},10000);

},2500);

</script>

</body>
</html>
